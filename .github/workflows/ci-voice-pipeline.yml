name: CI — Voice Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'voice-pipeline-nodejs/**'
      - '.github/workflows/ci-voice-pipeline.yml'
  pull_request:
    branches: [main]
    paths:
      - 'voice-pipeline-nodejs/**'

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: ./voice-pipeline-nodejs
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: voice-pipeline-nodejs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (node --check)
        run: node --check index.js

      # NOTE: Hangup-detection tests live in /tmp/test-hangup.mjs (not yet
      # committed). When moved into voice-pipeline-nodejs/test/, add a
      # `- run: npm test` step here.
